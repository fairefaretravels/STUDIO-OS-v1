<!DOCTYPE html>
<html>
<head>
  <title>STUDIO OS v2</title>
</head>

<body>

  <h1>LIVE CHANNEL</h1>

  <video id="player" controls autoplay style="width:100%"></video>

  <h2 id="title"></h2>

  <script src="studio.js"></script>
  <script src="media.js"></script>

  <script>
    window.onload = () => {
      MEDIA.start();
    };
  </script>
  <script>
window.onload = async () => {

    console.log("STARTING STUDIO OS...");

    const queue = await STUDIO.generate();

    console.log("QUEUE GENERATED:", queue);

    if (!queue || !queue.length) {
        console.error("QUEUE IS EMPTY");
        return;
    }

    MEDIA.start(queue);
};
</script>

</body>
</html>
